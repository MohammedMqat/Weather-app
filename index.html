<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img id="weatherImage" src="images.jpeg" alt="Weather" />
    <div class="weather-container">
      <div class="search-container">
        <input type="text" placeholder="Search" class="search-input" />
      </div>

      <div class="weather-info">
        <div class="location">
          <h1 id="city-name">New York</h1>
        </div>
        <div class="temperature">
          <h2 id="temperature">20°C</h2>
        </div>
        <div class="weather-icon">
          <img src="cloudy-icon.png" alt="Weather Icon" id="weather-icon" />
        </div>
      </div>

      <div class="time">
        <p id="time">08:30 AM</p>
        <p id="date">Wednesday 1 December 2021</p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
